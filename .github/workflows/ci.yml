name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Sapl.sln

      - name: Build
        run: dotnet build Sapl.sln --no-restore

      - name: Test
        run: dotnet test Sapl.sln --no-build --verbosity normal

      - name: Format check
        run: dotnet format Sapl.sln --verify-no-changes
