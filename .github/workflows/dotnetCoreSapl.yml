name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore "sapl-csharp/Sapl.sln"
    - name: Build
      run: dotnet build "sapl-csharp/Sapl.sln" --no-restore
    - name: Test
      run: dotnet test "sapl-csharp/Sapl.sln" --no-build --verbosity normal
